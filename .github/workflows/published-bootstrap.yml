name: published-bootstrap

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

jobs:
  published:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure generated bootstrap is current
        run: bash scripts/build-bootstrap.sh --check
      - name: Verify published bootstrap matches main
        run: bash scripts/check-published-bootstrap.sh --check-local-match --retry 18 --sleep 10
