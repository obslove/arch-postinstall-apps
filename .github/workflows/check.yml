name: check

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Bash syntax
        run: |
          bash -n scripts/bootstrap.sh
          bash -n scripts/install.sh
          bash -n scripts/postinstall-apps
      - name: Shellcheck
        run: shellcheck scripts/bootstrap.sh scripts/install.sh scripts/postinstall-apps
